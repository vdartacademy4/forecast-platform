{% extends "base.html" %}
{% block title %}Compare Models{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0"><i class="fas fa-balance-scale text-primary me-2"></i>Model Comparison</h2>
            <p class="text-muted mb-0">{{ dataset.file_name }}</p>
        </div>
    </div>

    <div class="card">
        <div class="card-body text-center py-5">
            <div class="spinner-border text-primary mb-3" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <h5>Building Comparison...</h5>
            <p class="text-muted">Analyzing all trained models and generating rankings.</p>
            <a href="{{ url_for('comparison.compare_results', dataset_id=dataset.id) }}" class="btn btn-primary mt-2">
                <i class="fas fa-sync me-1"></i>Refresh
            </a>
        </div>
    </div>
</div>
{% endblock %}
